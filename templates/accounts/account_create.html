{% extends 'base.html' %}
{% block title %}계정 생성 · Workit{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <a href="{% url 'account_list' %}" class="back-link" style="margin-bottom:8px; display:inline-flex;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="15 18 9 12 15 6"/></svg>
      계정관리로
    </a>
    <h1 class="page-title">계정 생성</h1>
    <p class="page-desc">초기 비밀번호가 자동 부여되며, 최초 로그인 시 비밀번호 변경이 강제됩니다.</p>
  </div>
</div>

<div class="card" style="max-width:560px;">
  <form method="post">
    {% csrf_token %}

    <div class="form-group">
      <label class="form-label">아이디</label>
      <input type="text" name="username" class="form-input" value="{{ form.username.value|default:'' }}" required>
      {% if form.username.errors %}<p class="field-error">{{ form.username.errors|join:', ' }}</p>{% endif %}
    </div>

    <div class="form-row" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div class="form-group">
        <label class="form-label">성</label>
        <input type="text" name="last_name" class="form-input" value="{{ form.last_name.value|default:'' }}" required>
      </div>
      <div class="form-group">
        <label class="form-label">이름</label>
        <input type="text" name="first_name" class="form-input" value="{{ form.first_name.value|default:'' }}" required>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">이메일</label>
      <input type="email" name="email" class="form-input" value="{{ form.email.value|default:'' }}" required>
    </div>

    <div class="form-group">
      <label class="form-label">전화번호</label>
      <input type="text" name="phone" class="form-input" value="{{ form.phone.value|default:'' }}" required>
    </div>

    <div class="form-row" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div class="form-group">
        <label class="form-label">소속부서</label>
        <select name="organization" class="form-input">
          <option value="">선택하세요</option>
          {% for org in form.fields.organization.queryset %}
            <option value="{{ org.id }}">{{ org.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">직급</label>
        <input type="text" name="position" class="form-input" value="{{ form.position.value|default:'' }}" required>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">부서(상세)</label>
      <input type="text" name="department" class="form-input" value="{{ form.department.value|default:'' }}" required>
    </div>

    <div class="form-group" style="display:flex; align-items:center; gap:8px; background:var(--bg); padding:12px 14px; border-radius:var(--radius-sm);">
      <input type="checkbox" name="is_superuser" id="id_is_superuser" {% if form.is_superuser.value %}checked{% endif %} style="width:16px; height:16px;">
      <label for="id_is_superuser" style="font-size:13px; margin:0;">
        관리자 권한 부여 <span style="color:var(--text-hint);">(체크 시 전체 부서 문서를 조회/관리할 수 있습니다. 소속부서는 선택하지 않아도 됩니다.)</span>
      </label>
    </div>

    <button type="submit" class="btn btn-primary btn-full">계정 생성</button>
  </form>
</div>
{% endblock %}
