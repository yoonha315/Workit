version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: workit_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - workit_network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: workit_qdrant
    restart: always
    ports:
      - "${QDRANT_PORT}:6333"
      - "${QDRANT_GRPC_PORT}:6334"
    volumes:
      - ./docker/qdrant_storage:/qdrant/storage
    networks:
      - workit_network

volumes:
  postgres_data:

networks:
  workit_network:
    driver: bridge