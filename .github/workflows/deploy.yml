name: Deploy to EC2

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: github.repository == 'SKN26-FLOW/Workit'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Zip source
        run: zip -r deploy.zip . -x "*.git*" -x ".env"

      - name: Compute checksum
        run: sha256sum deploy.zip > deploy.zip.sha256

      - name: Upload to S3
        run: |
          aws s3 cp deploy.zip s3://workit-documents-skn26/deploy/deploy.zip
          aws s3 cp deploy.zip.sha256 s3://workit-documents-skn26/deploy/deploy.zip.sha256

      - name: Check if  requirements-server.txt changed
        id: req_check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q " requirements-server.txt"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via SSM
        id: ssm
        run: |
          if [ "${{ steps.req_check.outputs.changed }}" = "true" ]; then
            PIP_CMD="/home/ubuntu/Workit/venv/bin/pip install -r /home/ubuntu/Workit/ requirements-server.txt"
          else
            PIP_CMD="echo ' requirements-server.txt unchanged, skipping pip install'"
          fi
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 600 \
            --parameters "{\"commands\":[
              \"set -e\",
              \"aws s3 cp s3://workit-documents-skn26/deploy/deploy.zip /home/ubuntu/deploy.zip\",
              \"aws s3 cp s3://workit-documents-skn26/deploy/deploy.zip.sha256 /home/ubuntu/deploy.zip.sha256\",
              \"cd /home/ubuntu && sha256sum -c deploy.zip.sha256\",
              \"cd /home/ubuntu && unzip -o deploy.zip -d Workit\",
              \"$PIP_CMD\",
              \"cd /home/ubuntu/Workit && /home/ubuntu/Workit/venv/bin/python manage.py migrate --noinput\",
              \"cd /home/ubuntu/Workit && /home/ubuntu/Workit/venv/bin/python manage.py collectstatic --noinput\",
              \"chmod -R o+rX /home/ubuntu/Workit/staticfiles\",
              \"sudo systemctl restart gunicorn celery\"
            ]}" \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT

      - name: Wait for SSM command
        run: |
          aws ssm wait command-executed \
            --command-id ${{ steps.ssm.outputs.command_id }} \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }}

      - name: Print SSM output
        if: always()
        run: |
          aws ssm get-command-invocation \
            --command-id ${{ steps.ssm.outputs.command_id }} \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --query "[StandardOutputContent, StandardErrorContent]" \
            --output text